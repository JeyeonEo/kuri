name: Kuri
options:
  bundleIdPrefix: com.yona.kuri
settings:
  base:
    SWIFT_VERSION: 6.0
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
packages:
  Kuri:
    path: ..
targets:
  KuriApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: KuriApp
      - path: SharedUI
    dependencies:
      - package: Kuri
        product: KuriCore
      - package: Kuri
        product: KuriStore
      - package: Kuri
        product: KuriSync
      - package: Kuri
        product: KuriObservability
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yona.kuri.app
        CODE_SIGN_ENTITLEMENTS: KuriApp/KuriApp.entitlements
        CODE_SIGN_STYLE: Automatic
  KuriShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - KuriShareExtension
      - SharedUI
    dependencies:
      - target: KuriApp
      - package: Kuri
        product: KuriCore
      - package: Kuri
        product: KuriStore
      - package: Kuri
        product: KuriObservability
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yona.kuri.shareextension
        INFOPLIST_FILE: KuriShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: KuriShareExtension/KuriShareExtension.entitlements
        CODE_SIGN_STYLE: Automatic
